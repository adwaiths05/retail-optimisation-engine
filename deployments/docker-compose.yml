services:
  # Backend API Service
  api:
    build:
      context: .. 
      dockerfile: deployments/backend.Dockerfile
    image: retail-engine:latest
    container_name: retail_api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      - reports_data:/app/mlops/reports

  # Frontend Streamlit Service
  frontend:
    build:
      context: ..
      dockerfile: deployments/frontend.Dockerfile
    image: retail-frontend:latest
    container_name: retail_frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://api:8000  # Points to the 'api' service above
    depends_on:
      - api
    restart: unless-stopped
    volumes:
      - reports_data:/app/mlops/reports

  # Cache Service
  redis:
    image: redis:7-alpine
    container_name: retail_cache
    ports:
      - "6379:6379"
    restart: always

networks:
  default:
    name: retail_network

volumes:
  reports_data: