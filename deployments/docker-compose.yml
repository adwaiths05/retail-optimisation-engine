version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: deployments/Dockerfile
    container_name: retail_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      # Ensure DATABASE_URL is in your local .env file
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: retail_cache
    ports:
      - "6379:6379"
    restart: always

networks:
  default:
    name: retail_network